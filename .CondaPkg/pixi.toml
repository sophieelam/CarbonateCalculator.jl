[dependencies]
openssl = ">=3, <3.6, >=3, <3.6"
uv = ">=0.4"
pandas = "==1.5.3"
numpy = "*"
kgen = "*"
scipy = "*"

    [dependencies.python]
    channel = "conda-forge"
    build = "*cp*"
    version = ">=3.10,!=3.14.0,!=3.14.1,<4, 3.11, >=3.10,!=3.14.0,!=3.14.1,<4"

[workspace]
name = ".CondaPkg"
platforms = ["osx-arm64"]
channels = ["conda-forge"]
channel-priority = "strict"
description = "automatically generated by CondaPkg.jl"

[pypi-dependencies]
pyco2sys = "*"
kgen = "*"
